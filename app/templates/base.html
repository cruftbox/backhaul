<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Backhaul{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <a href="/" class="brand">&#9889; Backhaul</a>
      {% block nav_extra %}
      <div class="nav-links">
        <a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>Home</a>
        <a href="/settings" {% if request.url.path == "/settings" %}class="active"{% endif %}>Settings</a>
      </div>
      {% endblock %}
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
